{% extends 'movie_app/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5 mt-4">
        
        <h2 class="text-center mb-4">Welcome Back</h2>
        
        <div class="card rounded-0" style="border: var(--wireframe-border);">
            <div class="card-body p-4">
                <h4 class="card-title mb-4">Login</h4>
                
                <form>
                    <div class="mb-3">
                        <label for="username" class="form-label mb-0">Username</label>
                        <input type="text" class="form-control rounded-0 border-dark" id="username">
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label mb-0">Password</label>
                        <input type="password" class="form-control rounded-0 border-dark" id="password">
                    </div>
                    
                    <div class="d-flex flex-column">
                        <a href="{% url 'signup' %}" class="text-decoration-underline mb-3" style="color: var(--primary-blue);">Don't have an account? Sign up</a>
                        <button type="submit" class="btn text-white rounded-0" style="background-color: var(--primary-blue);">Login</button>
                    </div>
                </form>
                
            </div>
        </div>
        
    </div>
</div>
{% endblock %}
