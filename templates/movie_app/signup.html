{% extends 'movie_app/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5 mt-4">
        
        <h2 class="text-center mb-4">Welcome</h2>
        
        <div class="card rounded-0" style="border: var(--wireframe-border);">
            <div class="card-body p-4">
                <h4 class="card-title mb-4">Sign Up</h4>
                
                {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                {% endif %}

                {% if registered %}
                    <div class="alert alert-success">
                        Account created! <a href="{% url 'movie_app:login' %}">Login here</a>
                    </div>
                {% else %}

                <form action="{% url 'movie_app:sign_up' %}" method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="username" class="form-label mb-0">Username</label>
                        <input type="text" class="form-control rounded-0 border-dark" id="username" name="username">
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label mb-0">Email</label>
                        <input type="email" class="form-control rounded-0 border-dark" id="email" name="email">
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label mb-0">Password</label>
                        <input type="password" class="form-control rounded-0 border-dark" id="password" name="password">
                    </div>
                    
                    <div class="mb-4">
                        <label for="confirm_password" class="form-label mb-0">Confirm Password</label>
                        <input type="password" class="form-control rounded-0 border-dark" id="confirm_password" name="password2">
                    </div>
                    
                    <div class="d-flex flex-column">
                        <a href="{% url 'movie_app:login' %}" class="text-decoration-underline mb-3" style="color: var(--primary-blue);">Go to login page</a>
                        <button type="submit" class="btn text-white rounded-0" style="background-color: var(--primary-blue);">Create Account</button>
                    </div>
                </form>
                
                {% endif %}

            </div>
        </div>
        
    </div>
</div>
{% endblock %}
